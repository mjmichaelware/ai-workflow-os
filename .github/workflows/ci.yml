
name: ci

on:
  push:
  pull_request:

jobs:
  local-proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install test dependency
        run: python -m pip install pytest
      - name: Compile
        run: python -m py_compile $(find ai_workflow_os scripts -name "*.py" -type f)
      - name: Test
        run: PYTHONPATH="$PWD" python -m pytest -q
      - name: Hygiene
        run: python scripts/verify_public_surface.py
