name: CI

on:
  push:
    branches: [master, main, public-contributor-readiness]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip pytest
      - name: Compile
        run: |
          python -m py_compile $(find ai_workflow_os -name "*.py" -type f)
          python -m py_compile scripts/registry_spine.py
      - name: Test
        run: |
          PYTHONPATH="$PWD" python -m pytest -q
      - name: Verify
        run: |
          bash scripts/verify_workflow_app.sh
