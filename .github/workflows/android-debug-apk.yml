name: Build Android Debug APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*apk*"

permissions:
  contents: read

jobs:
  build-debug-apk:
    name: Build debug APK on Linux runner
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android command line tools
        shell: bash
        run: |
          set -euo pipefail
          export ANDROID_HOME="$RUNNER_TEMP/android-sdk"
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          mkdir -p "$ANDROID_HOME/cmdline-tools" "$RUNNER_TEMP/android-cmdline"

          python3 - <<'PY'
          from urllib.request import urlopen
          from pathlib import Path
          import re

          page = urlopen("https://developer.android.com/studio", timeout=60).read().decode("utf-8", "ignore")
          matches = re.findall(r"https://dl\.google\.com/android/repository/commandlinetools-linux-[0-9]+_latest\.zip", page)
          if not matches:
              matches = re.findall(r"//dl\.google\.com/android/repository/commandlinetools-linux-[0-9]+_latest\.zip", page)
              matches = ["https:" + m for m in matches]
          if not matches:
              raise SystemExit("Could not discover Android command line tools URL")
          Path("/tmp/android_cmdline_url.txt").write_text(matches[0] + "\n", encoding="utf-8")
          print(matches[0])
          PY

          CMDLINE_URL="$(cat /tmp/android_cmdline_url.txt)"
          wget -q -O "$RUNNER_TEMP/commandlinetools-linux.zip" "$CMDLINE_URL"
          unzip -q "$RUNNER_TEMP/commandlinetools-linux.zip" -d "$RUNNER_TEMP/android-cmdline"
          mkdir -p "$ANDROID_HOME/cmdline-tools/latest"
          mv "$RUNNER_TEMP/android-cmdline/cmdline-tools/"* "$ANDROID_HOME/cmdline-tools/latest/"

          echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/build-tools/36.0.0" >> "$GITHUB_PATH"

          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "cmdline-tools;latest"

      - name: Show toolchain
        shell: bash
        run: |
          set -euo pipefail
          java -version
          javac -version
          gradle --version
          sdkmanager --version
          aapt2 version
          apksigner --version || true
          zipalign || true

      - name: Build debug APK through project proof script
        shell: bash
        run: |
          set -euo pipefail
          python3 -m py_compile $(find ai_workflow_os -name "*.py" -type f)
          python3 -m py_compile $(find scripts -name "*.py" -type f)
          python3 scripts/prove_real_apk_build.py
          python3 - <<'PY'
          import json
          import sys
          from pathlib import Path

          report = Path("docs/apk/REAL_APK_BUILD_ATTEMPT_REPORT.json")
          data = json.loads(report.read_text())
          print(json.dumps({
              "debug_apk_built": data.get("debug_apk_built"),
              "debug_apk": data.get("debug_apk"),
              "build_returncode": data.get("build_returncode"),
              "stderr_tail": data.get("build_stderr_tail", "")[-2000:],
              "stdout_tail": data.get("build_stdout_tail", "")[-2000:],
          }, indent=2))
          if not data.get("debug_apk_built"):
              sys.exit(1)
          PY

      - name: Stage artifact files
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifact
          find exports -name "*.apk" -type f -print -exec cp {} artifact/AI-Workflow-OS-debug.apk \; || true
          cp docs/apk/REAL_APK_BUILD_ATTEMPT_REPORT.json artifact/REAL_APK_BUILD_ATTEMPT_REPORT.json || true
          ls -la artifact || true

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AI-Workflow-OS-debug-apk
          path: artifact/*
          if-no-files-found: warn
